server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html index.htm;

    client_max_body_size 20M;

    # Cấu hình nén Gzip để tăng tốc tải trang
    gzip on;
    gzip_min_length 1000;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript application/x-javascript text/xml application/xml application/xml+rss text/javascript;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy các yêu cầu API tới Container Backend
    location /api {
        proxy_pass http://api:8080/api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy SignalR (Hubs)
    location /hubs {
        proxy_pass http://api:8080/hubs;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Proxy các yêu cầu TTS tới Container qms-tts
    location /api-tts {
        proxy_pass http://tts:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Bổ sung rewrite để khớp với cấu hình Flask trong container
        rewrite ^/api-tts/(.*) /$1 break;
    }

    # Cache cho các tệp tĩnh (ảnh, font)
    location ~* \.(?:ico|css|gif|jpe?g|png|woff2?|eot|ttf|svg)$ {
        expires 6M;
        access_log off;
        add_header Cache-Control "public";
    }

    # PWA manifest - Không cache để luôn lấy bản mới
    location ~* \.webmanifest$ {
        add_header Content-Type application/manifest+json;
        add_header Cache-Control "no-cache";
    }

    # Service worker - Không cache
    location = /ngsw-worker.js {
        add_header Cache-Control "no-cache";
        add_header Content-Type application/javascript;
    }

    # JS files
    location ~* \.js$ {
        expires 1y;
        add_header Cache-Control "public";
    }

    # Chặn truy cập vào các tệp ẩn
    location ~ /\. {
        deny all;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
