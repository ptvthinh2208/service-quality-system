<app-navigation
  class="pcoded-navbar"
  [ngClass]="{
    'navbar-collapsed': navCollapsed,
    'mob-open': navCollapsedMob
  }"
  [navCollapsed]="navCollapsed"
  (NavCollapse)="this.navCollapsed = !this.navCollapsed"
  (NavCollapsedMob)="navMobClick()"
/>
<app-nav-bar 
  class="navbar pcoded-header navbar-expand-lg navbar-light" 
  [ngClass]="{ 'navbar-collapsed': navCollapsed }"
  [navCollapsed]="navCollapsed"
  (NavCollapse)="this.navCollapsed = !this.navCollapsed"
  (NavCollapsedMob)="navMobClick()" 
/>
<div class="pcoded-main-container" [ngClass]="{ 'navbar-collapsed': navCollapsed }">
  <div class="pcoded-wrapper">
    <div class="pcoded-content">
      <div class="pcoded-inner-content">
        <app-breadcrumb />
        <div class="main-body">
          <div class="page-wrapper">
            <router-outlet />
          </div>
        </div>
      </div>
    </div>
  </div>
  @if (navCollapsedMob) {
    <div class="pc-menu-overlay" (click)="closeMenu()" (keydown)="handleKeyDown($event)" tabindex="0"></div>
  }
</div>
<app-footer [ngClass]="{ 'navbar-collapsed': navCollapsed }" />
<app-configuration />
